services:
  wifi-portal:
    build:
      context: ..
      dockerfile: wifi_portal/Dockerfile
    container_name: wifi-portal
    network_mode: host
    privileged: true
    volumes:
      - /etc/wpa_supplicant:/etc/wpa_supplicant
      - /run/wpa_supplicant:/run/wpa_supplicant
    environment:
      - WIFI_INTERFACE=wlan0
      - WPA_SUPPLICANT_CONF=/etc/wpa_supplicant/wpa_supplicant.conf
    command: ["uvicorn", "wifi_portal.webui.app:app", "--host", "0.0.0.0", "--port", "8080"]
