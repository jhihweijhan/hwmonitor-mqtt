services:
  # 系統監控代理 - 核心服務
  sys_agent:
      build: .
      container_name: sys-agent
      # 修正：在 PVE 宿主機，建議使用 unconfined 或直接用特權模式
      security_opt:
        - apparmor:unconfined
      restart: unless-stopped
      profiles: ["agent", "full"]

      network_mode: host
      pid: host

      volumes:
        - /sys:/sys:ro
        - /dev:/dev:rw
        # 嘗試手動掛載 NVIDIA 驅動相關檔案 (因為主機無 nvidia-container-toolkit)
        - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
        - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro


      # 讓容器能存取 GPU 裝置
      devices:
        - /dev/dri:/dev/dri


      # 修正：監控 Agent 建議開啟特權模式以存取溫度與 GPU 硬體介面
      privileged: true 
      
      # 修正：暫時將此設為 false 排除 AppArmor 報錯問題
      read_only: false

      environment:
        BROKER_HOST: ${BROKER_HOST}
        BROKER_PORT: ${BROKER_PORT:-1883}
        MQTT_USER: ${MQTT_USER}
        MQTT_PASS: ${MQTT_PASS}

  # ESP 接收端專用 sender（精簡 payload + 節流）
  sys_agent_esp:
      build: .
      container_name: sys-agent-esp
      security_opt:
        - apparmor:unconfined
      restart: unless-stopped
      profiles: ["esp-agent"]

      network_mode: host
      pid: host

      volumes:
        - /sys:/sys:ro
        - /dev:/dev:rw
        - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
        - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro

      devices:
        - /dev/dri:/dev/dri

      privileged: true
      read_only: false

      environment:
        BROKER_HOST: ${BROKER_HOST}
        BROKER_PORT: ${BROKER_PORT:-1883}
        MQTT_USER: ${MQTT_USER}
        MQTT_PASS: ${MQTT_PASS}
        SENDER_PROFILE: esp
        PUBLISH_INTERVAL_SEC: ${PUBLISH_INTERVAL_SEC:-1}
        ESP_MIN_PUBLISH_INTERVAL_SEC: ${ESP_MIN_PUBLISH_INTERVAL_SEC:-2}
        ESP_HEARTBEAT_INTERVAL_SEC: ${ESP_HEARTBEAT_INTERVAL_SEC:-10}

  # MQTT Broker - Mosquitto
  mqtt_broker:
    image: eclipse-mosquitto:2.0.21
    container_name: mqtt-broker
    restart: unless-stopped
    profiles: ["broker", "full"]  # 啟用 broker 或 full profile 時運行

    # MQTT 標準端口 + WebSocket
    ports:
      - "1883:1883"        # MQTT TCP
      - "8081:8081"        # MQTT WebSocket (for browser)

    # 配置檔案和密碼檔案
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto_passwd:/mosquitto/config/passwd:ro

    # 安全設定
    security_opt:
      - no-new-privileges:true

  # Web 監控介面 - Nginx 靜態檔案伺服器
  web_monitor:
    image: nginx:alpine    # 輕量級 Nginx (~8MB)
    container_name: monitor-web
    restart: unless-stopped
    profiles: ["web", "full"]  # 啟用 web 或 full profile 時運行

    # 對外提供 Web 介面
    ports:
      - "${WEB_PORT:-8088}:80"  # 主機 port → 容器 port 80

    # 掛載監控頁面
    volumes:
      - ./monitor.html:/usr/share/nginx/html/index.html:ro

    # 安全設定
    security_opt:
      - no-new-privileges:true
    read_only: true        # 容器根檔案系統唯讀
    tmpfs:                 # 臨時檔案使用記憶體
      - /var/cache/nginx
      - /var/run
